<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" role="img" aria-label="The Genius Project banner">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05070f"/>
      <stop offset="45%" stop-color="#0b1024"/>
      <stop offset="72%" stop-color="#2a1526"/>
      <stop offset="100%" stop-color="#3a1e12"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="78%" r="60%">
      <stop offset="0%" stop-color="#ff8a3d" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#ff6a2b" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#c23b1e" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6be4ff" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#6be4ff" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd7a8"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#7fdcff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="haze" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- sky and glow -->
  <rect width="1200" height="480" fill="url(#sky)"/>
  <rect width="1200" height="480" fill="url(#sun)"/>

  <!-- volumetric light beams -->
  <g opacity="0.7">
    <polygon points="300,90 330,90 250,360 180,360" fill="url(#beam)" filter="url(#soft)"/>
    <polygon points="640,70 665,70 705,360 610,360" fill="url(#beam)" filter="url(#soft)"/>
    <polygon points="915,95 940,95 1010,360 905,360" fill="url(#beam)" filter="url(#soft)"/>
  </g>

  <!-- far skyline -->
  <g fill="#0a1130" opacity="0.9">
    <rect x="60" y="250" width="40" height="150"/>
    <rect x="120" y="220" width="34" height="180"/>
    <rect x="175" y="270" width="46" height="130"/>
    <rect x="250" y="200" width="30" height="200"/>
    <rect x="300" y="240" width="52" height="160"/>
    <rect x="900" y="230" width="38" height="170"/>
    <rect x="955" y="255" width="44" height="145"/>
    <rect x="1015" y="205" width="30" height="195"/>
    <rect x="1065" y="245" width="48" height="155"/>
    <rect x="1130" y="225" width="34" height="175"/>
  </g>

  <!-- fog band -->
  <rect x="0" y="300" width="1200" height="90" fill="#20304f" opacity="0.35" filter="url(#haze)"/>

  <!-- near skyline (monoliths) with teal window lights -->
  <g fill="#04060e">
    <rect x="140" y="150" width="80" height="260"/>
    <rect x="240" y="120" width="70" height="290"/>
    <rect x="330" y="180" width="90" height="230"/>
    <rect x="470" y="140" width="70" height="270"/>
    <rect x="720" y="130" width="80" height="280"/>
    <rect x="820" y="170" width="72" height="240"/>
    <rect x="980" y="150" width="86" height="260"/>
  </g>
  <g fill="#5fd3ef" opacity="0.85">
    <rect x="156" y="176" width="7" height="10"/><rect x="172" y="176" width="7" height="10"/><rect x="188" y="200" width="7" height="10"/>
    <rect x="156" y="230" width="7" height="10"/><rect x="188" y="256" width="7" height="10"/><rect x="172" y="300" width="7" height="10"/>
    <rect x="256" y="150" width="7" height="10"/><rect x="276" y="176" width="7" height="10"/><rect x="292" y="210" width="7" height="10"/>
    <rect x="256" y="250" width="7" height="10"/><rect x="276" y="300" width="7" height="10"/>
    <rect x="486" y="170" width="7" height="10"/><rect x="506" y="200" width="7" height="10"/><rect x="486" y="260" width="7" height="10"/>
    <rect x="736" y="160" width="7" height="10"/><rect x="762" y="190" width="7" height="10"/><rect x="736" y="250" width="7" height="10"/><rect x="762" y="300" width="7" height="10"/>
    <rect x="996" y="180" width="7" height="10"/><rect x="1024" y="210" width="7" height="10"/><rect x="996" y="270" width="7" height="10"/>
  </g>
  <g fill="#ffb066" opacity="0.8">
    <rect x="344" y="210" width="7" height="10"/><rect x="368" y="250" width="7" height="10"/><rect x="344" y="300" width="7" height="10"/>
    <rect x="836" y="200" width="7" height="10"/><rect x="860" y="250" width="7" height="10"/><rect x="836" y="320" width="7" height="10"/>
  </g>

  <!-- lone figure on a ledge -->
  <g fill="#020308">
    <rect x="590" y="360" width="220" height="14"/>
    <ellipse cx="640" cy="352" rx="8" ry="10"/>
    <rect x="634" y="352" width="12" height="26" rx="3"/>
  </g>
  <ellipse cx="640" cy="330" rx="40" ry="60" fill="#ff8a3d" opacity="0.10" filter="url(#haze)"/>

  <!-- title -->
  <text x="600" y="196" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" letter-spacing="6" fill="url(#title)">THE GENIUS PROJECT</text>
  <text x="600" y="238" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="10" fill="#9fb6c9">YEAR 3 &#8226; WORLD CUP PREDICTION LAB</text>

  <!-- grain / vignette -->
  <rect width="1200" height="480" fill="black" opacity="0.10"/>
  <rect x="0" y="0" width="1200" height="8" fill="#000"/>
  <rect x="0" y="472" width="1200" height="8" fill="#000"/>
</svg>
