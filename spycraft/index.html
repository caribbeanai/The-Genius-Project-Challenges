<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Spycraft &middot; Get your secret role</title>
<meta name="description" content="Tap once to receive your secret role. Red screen: you are a spy. Green screen: you are clean.">
<style>
  :root {
    --bg:#0A0C10; --panel:#12151C; --ink:#E7EAF0; --muted:#8A90A0; --line:#232833;
    --accent:#38C6A4; --spy:#E23A3A; --clean:#25B36B;
    --font: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
    --font-body: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: var(--font-body); -webkit-font-smoothing: antialiased;
    display: grid; place-items: center; min-height: 100dvh; padding: 22px;
    overflow: hidden;
  }
  .card {
    width: min(440px, 100%); background: var(--panel);
    border: 1px solid var(--line); border-radius: 18px; padding: 30px 26px 26px;
    box-shadow: 0 30px 80px rgba(0,0,0,.55); text-align: center; position: relative;
  }
  .badge {
    font-family: var(--font); font-size: .72rem; letter-spacing: .32em; text-transform: uppercase;
    color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 40%, var(--line));
    border-radius: 999px; padding: 6px 14px; display: inline-block;
  }
  h1 {
    font-family: var(--font); font-weight: 700; letter-spacing: .04em;
    font-size: clamp(2rem, 8vw, 2.7rem); margin: 18px 0 6px;
  }
  h1 .glitch { color: var(--accent); }
  .sub { color: var(--muted); font-size: .96rem; margin: 0 auto; max-width: 34ch; line-height: 1.55; }
  form { margin-top: 24px; display: flex; flex-direction: column; gap: 14px; }
  label { text-align: left; font-size: .74rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
  input[type=text] {
    width: 100%; font: inherit; font-size: 1.05rem; color: var(--ink);
    background: #0C0F15; border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px;
  }
  input[type=text]:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
  button.reveal {
    font-family: var(--font); font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
    cursor: pointer; color: #04120D; background: linear-gradient(180deg, #4FE3BE, var(--accent));
    border: 0; border-radius: 12px; padding: 18px; font-size: 1.05rem; margin-top: 6px;
    box-shadow: 0 12px 30px color-mix(in srgb, var(--accent) 35%, transparent);
    transition: filter .15s ease, transform .05s ease;
  }
  button.reveal:hover:not(:disabled) { filter: brightness(1.06); }
  button.reveal:active:not(:disabled) { transform: translateY(1px); }
  button.reveal:disabled { opacity: .55; cursor: default; }
  .err { color: #ff9a9a; font-size: .9rem; min-height: 1.2em; }
  .fine { margin-top: 18px; color: var(--muted); font-size: .78rem; line-height: 1.5; }

  /* ---------- Full-screen reveal ---------- */
  #reveal {
    position: fixed; inset: 0; z-index: 10; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 28px; color: #fff;
  }
  #reveal.show { display: flex; animation: flashIn .5s ease both; }
  #reveal.spy   { background: radial-gradient(120% 90% at 50% 20%, #ff5a5a 0%, #C61E1E 45%, #7c0d0d 100%); }
  #reveal.clean { background: radial-gradient(120% 90% at 50% 20%, #43d98a 0%, #1E9E5C 45%, #0c5e35 100%); }
  #reveal .kicker { font-family: var(--font); letter-spacing: .34em; text-transform: uppercase; font-size: .8rem; opacity: .9; }
  #reveal .role { font-family: var(--font); font-weight: 700; font-size: clamp(2.6rem, 13vw, 5.2rem); letter-spacing: .02em; margin: 10px 0; text-shadow: 0 6px 30px rgba(0,0,0,.35); }
  #reveal .role-icon { font-size: clamp(56px, 16vw, 104px); line-height: 1; }
  #reveal .msg { max-width: 30ch; font-size: 1.12rem; line-height: 1.5; opacity: .96; }
  #reveal .hide-note { margin-top: 26px; font-size: .82rem; letter-spacing: .06em; opacity: .8; font-family: var(--font); }
  #reveal .again {
    margin-top: 22px; font-family: var(--font); font-size: .8rem; letter-spacing: .1em; text-transform: uppercase;
    background: rgba(0,0,0,.22); border: 1px solid rgba(255,255,255,.35); color: #fff;
    border-radius: 999px; padding: 10px 18px; cursor: pointer;
  }
  #reveal .again:hover { background: rgba(0,0,0,.35); }

  @keyframes flashIn { from { opacity: 0; transform: scale(1.04); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { #reveal.show { animation: none; } }
</style>
</head>
<body>
  <main class="card" id="setup">
    <span class="badge">Spycraft &middot; Classified</span>
    <h1>SPY<span class="glitch">CRAFT</span></h1>
    <p class="sub">One tap assigns your secret role for this round. Keep your screen to yourself.</p>
    <form id="form" autocomplete="off">
      <div>
        <label for="name">Agent name</label>
        <input id="name" type="text" placeholder="e.g. Maya" maxlength="60" inputmode="text">
      </div>
      <button class="reveal" id="revealBtn" type="submit">Reveal my role</button>
      <div class="err" id="err" role="alert"></div>
    </form>
    <p class="fine">Your role is assigned once and saved on the server. Reopening this page shows the same role, so nobody can re-roll.</p>
  </main>

  <section id="reveal" aria-live="assertive">
    <div class="role-icon" id="rIcon">&#128373;</div>
    <div class="kicker" id="rKicker">Your role</div>
    <div class="role" id="rRole"></div>
    <p class="msg" id="rMsg"></p>
    <div class="hide-note">Tap to hide, then pass the phone on.</div>
    <button class="again" id="hideBtn" type="button">Hide</button>
  </section>

<script>
(function () {
  "use strict";
  var API = "/.netlify/functions/role";

  // A stable per-device id so a player keeps one role across reloads.
  function uid() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return "p-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 10);
  }
  var pid = localStorage.getItem("spycraft_pid");
  if (!pid) { pid = uid(); localStorage.setItem("spycraft_pid", pid); }

  var $ = function (id) { return document.getElementById(id); };
  var setup = $("setup"), reveal = $("reveal");
  var form = $("form"), btn = $("revealBtn"), err = $("err"), nameInput = $("name");

  var savedName = localStorage.getItem("spycraft_name");
  if (savedName) nameInput.value = savedName;

  function showRole(isSpy) {
    reveal.classList.remove("spy", "clean");
    reveal.classList.add("show", isSpy ? "spy" : "clean");
    $("rIcon").innerHTML = isSpy ? "&#129399;" : "&#128737;"; // masked face / shield
    $("rKicker").textContent = "Identity confirmed";
    $("rRole").textContent = isSpy ? "YOU ARE A SPY" : "NOT A SPY";
    $("rMsg").textContent = isSpy
      ? "Blend in. Complete your mission without being caught."
      : "You are clean. Watch closely and help find the 5 spies.";
    document.title = isSpy ? "SPY" : "CLEAN";
  }

  function cachedRole() {
    var r = localStorage.getItem("spycraft_role");
    if (r === "spy" || r === "civilian") return r;
    return null;
  }

  // If this device already has a role, show it immediately.
  var cached = cachedRole();
  if (cached) showRole(cached === "spy");

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    err.textContent = "";
    btn.disabled = true; btn.textContent = "Assigning…";
    var name = nameInput.value.trim();
    localStorage.setItem("spycraft_name", name);

    fetch(API, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ playerId: pid, name: name })
    })
    .then(function (res) { return res.json().then(function (d) { return { ok: res.ok, d: d }; }); })
    .then(function (r) {
      if (!r.ok) throw new Error(r.d && r.d.error ? r.d.error : "Something went wrong.");
      localStorage.setItem("spycraft_role", r.d.isSpy ? "spy" : "civilian");
      showRole(!!r.d.isSpy);
    })
    .catch(function (ex) {
      err.textContent = ex.message || "Network error, try again.";
    })
    .finally(function () {
      btn.disabled = false; btn.textContent = "Reveal my role";
    });
  });

  $("hideBtn").addEventListener("click", function () {
    reveal.classList.remove("show");
    document.title = "Spycraft · Get your secret role";
  });
})();
</script>
</body>
</html>
